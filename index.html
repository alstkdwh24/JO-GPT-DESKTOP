<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Content Security Policy: recommended for Electron security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:8086; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data:;">    <title>JO-GPT PC Client</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add_circle,more_horiz"/>
    <link rel="stylesheet" href="./css/GPT-Home.css">
    <link rel="stylesheet" href="./css/modelJoin.css">
    <script src="./node_modules/jquery/dist/jquery.min.js"></script>

</head>
<body>

<!-- 사이드바 부분 -->
<div class="sideBar">
    <div class="sideBar-top">
        <button class="sideBarImg"><img src="./image/menu.png" alt="메뉴"></button>
        <button class="sideBarButtonImg">
            <span class="material-symbols-outlined">add_circle</span>
        </button>
        <button class="sideBarImgTwo"><img src="./image/chatting.png" alt="채팅" style="scale: 180%"></button>
        <button class="sideBarButtonImgSpot"><span class="material-symbols-outlined" style="scale: 150%;">
more_horiz
</span></button>
    </div>
    <!-- 하단 설정 아이콘 -->
    <div class="sideBar-bottom">
        <button class="sideBarImgTwo">
            <i class="fa fa-cog" style="font-size: 24px; color: #555;"></i>
        </button>
    </div>
</div>

<div class="content">
    <div class="topBar">
        <div class="topBar-left">
            <h2>JO-GPT</h2>
        </div>
        <div class="topBar-middle"></div>
        <div class="topBar-right">
            <div id="authButtons" class="topBar-rightRight">
                <button class="buttonWhite">로그인</button>
                <button class="buttonBlack">회원가입</button>
            </div>
            <div id="userProfile" class="topBar-rightRight" style="display: none;">
                <span id="userNameDisplay">사용자</span>님
                <button id="logoutButton" class="buttonWhite" style="margin-left: 10px;">로그아웃</button>
            </div>
        </div>
    </div>
    
    <div class="realContent">
        <div class="realBox">
            <div class="realBoxFont">
                안녕하세요 <span id="userName">사용자</span>님
            </div>

            <div class="input-wrapper">
                <textarea class="fake-input" placeholder="무엇이든 물어보세요..."
                          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>

                <div class="search-div">
                    <div class="left-tools">
                        <button class="search-btn">
                            <i class="fa fa-paperclip"></i>
                        </button>
                    </div>
                    <div class="search-result">
                        <select class="select-model">
                            <option>GPT-4.5</option>
                            <option>Gemini 1.5</option>
                        </select>
                        <button class="search-btn search-real">
                            <i class="fa fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 모달 로그인/회원가입 -->
<div class="modelLogin">
    <div class="modelJoin">
        <div class="modelJoinTitle">
            <h2 class="modelJoinTitleH2">로그인 또는 회원가입</h2>
            <p class="modelJoinTitleP">소셜 로그인을 통해 쉽게 로그인하세요</p>
        </div>
        <div class="modelJoinSocial">
            <!--electron은 location.href가 막혀있다. 그래서 onclick="require('electron').shell.openExternal('http://localhost:8086/oauth2/authorization/kakao')" 이런식으로 해야한다.-->
            <div class="socialJoin-kakao" data-url="http://localhost:8086/oauth2/authorization/kakao">            <div class="socialJoins-round"> <img src="./image/kakaoLogo.png" class="login-logo" alt="카카오로고"></div>
                <div class="socialJoins-name">카카오 로그인</div>
            </div>
            <div class="socialJoin-naver" data-url="http://localhost:8086/oauth2/authorization/naver">
                <div class="socialJoins-round"> <img src="./image/naver_login.png" alt="네이버 로그인" class="login-logo"></div>
                <div class="socialJoins-name">네이버 로그인</div>
            </div>
            <div class="socialJoin-google"  data-url="http://localhost:8086/oauth2/authorization/google">
                <div class="socialJoins-round"><img src="./image/google_login.png" alt="구글 로그인" class="login-logo login-google" ></div>
                <div class="socialJoins-name">구글 로그인</div>
            </div>
            <div class="socialJoin-facebook" data-url="http://localhost:8086/oauth2/authorization/facebook">
                <div class="socialJoins-round"><img src="./image/facebook_login.png" alt="페이스북 로그인" class="login-logo"></div>
                <div class="socialJoins-name">페이스북 로그인</div>
            </div>
            <div class="socialJoin-github" data-url="http://localhost:8086/oauth2/authorization/github">
                <div class="socialJoins-round"><img src="./image/GitHub_login.svg" alt="깃허브 로그인" class="login-logo"></div>
                <div class="socialJoins-name">깃허브 로그인</div>
            </div>
            <div class="socialJoin-self">
                <div class="socialJoins-round"><img alt="JO-GPT_login" src="./image/JO-GPT_login.png" class="login-logo"></div>
                <div class="socialJoins-name">JO-GPT 회원가입</div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts-->
<script src="./js/home/GPT-model-button.js"></script>
<script src="./js/home/textareaJs.js"></script>
<script src="./js/home/gpt-home.js"></script>
</body>
</html>
